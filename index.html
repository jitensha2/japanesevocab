<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>たんご れんしゅう — Tango Renshuu</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #ffffff;
    --bg2: #f8f7f4;
    --bg3: #f0efe9;
    --text: #1a1a1a;
    --text2: #555;
    --text3: #888;
    --accent: #e84040;
    --accent2: #2563eb;
    --accent3: #16a34a;
    --gold: #d97706;
    --border: rgba(0,0,0,0.08);
    --card-shadow: 0 2px 16px rgba(0,0,0,0.06);
    --radius: 12px;
    --font-jp: 'Noto Sans JP', sans-serif;
    --font-mono: 'Space Mono', monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: var(--font-jp);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* LAYOUT */
  #app { display: flex; flex-direction: column; min-height: 100vh; }

  /* TOP HUD */
  #hud {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 20px;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    height: 52px;
  }
  .hud-left { display: flex; align-items: center; gap: 12px; }
  .hud-xp {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--gold);
    font-weight: 700;
    letter-spacing: 0.05em;
  }
  .level-badge {
    background: var(--gold);
    color: white;
    font-family: var(--font-mono);
    font-size: 11px;
    font-weight: 700;
    padding: 3px 8px;
    border-radius: 20px;
  }
  .hud-right { display: flex; align-items: center; gap: 16px; }
  .streak-display {
    font-family: var(--font-mono);
    font-size: 13px;
    font-weight: 700;
    color: var(--accent);
  }
  .streak-display.hot { color: #f97316; animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.1); } }

  .hud-title {
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.08em;
    color: var(--text2);
  }

  /* XP BAR */
  #xp-bar-wrap {
    position: fixed; top: 52px; left: 0; right: 0; z-index: 99;
    height: 3px; background: var(--bg3);
  }
  #xp-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--gold), #f59e0b);
    transition: width 0.5s ease;
  }

  /* MAIN CONTENT */
  #main {
    margin-top: 55px;
    flex: 1;
  }

  /* DECK TABS */
  #deck-tabs {
    display: flex;
    gap: 8px;
    padding: 16px 20px 0;
    overflow-x: auto;
    scrollbar-width: none;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
  }
  #deck-tabs::-webkit-scrollbar { display: none; }
  .deck-tab {
    display: flex; flex-direction: column; align-items: center;
    padding: 10px 16px;
    border-radius: 10px 10px 0 0;
    border: 1px solid transparent;
    background: none;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.15s;
    font-family: var(--font-jp);
    gap: 2px;
    min-width: 90px;
  }
  .deck-tab .tab-jp { font-size: 13px; font-weight: 700; color: var(--text2); }
  .deck-tab .tab-en { font-size: 10px; color: var(--text3); }
  .deck-tab .tab-prog {
    font-size: 9px;
    font-family: var(--font-mono);
    color: var(--text3);
    margin-top: 3px;
  }
  .deck-tab:hover { background: var(--bg2); }
  .deck-tab.active {
    background: var(--bg);
    border-color: var(--border);
    border-bottom-color: var(--bg);
    margin-bottom: -1px;
  }
  .deck-tab.active .tab-jp { color: var(--accent); }
  .deck-tab.mastered .tab-prog { color: var(--accent3); }


  /* MODE SWITCHER */
  #mode-bar {
    display: flex; gap: 10px;
    padding: 16px 20px;
    background: var(--bg);
  }
  .mode-btn {
    flex: 1;
    padding: 12px 8px;
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    background: var(--bg2);
    cursor: pointer;
    font-family: var(--font-jp);
    font-size: 13px;
    font-weight: 700;
    color: var(--text2);
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    transition: all 0.15s;
  }
  .mode-btn .mode-icon { font-size: 18px; }
  .mode-btn:hover { background: var(--bg3); border-color: rgba(0,0,0,0.15); }
  .mode-btn.active {
    background: var(--text);
    border-color: var(--text);
    color: var(--bg);
  }

  /* STUDY MODE */
  #study-area { padding: 0 20px 100px; }

  .card-counter {
    text-align: center;
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text3);
    margin-bottom: 16px;
    letter-spacing: 0.05em;
  }

  .flashcard {
    background: var(--bg);
    border: 1.5px solid var(--border);
    border-radius: 20px;
    padding: 40px 28px;
    min-height: 280px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    cursor: pointer;
    user-select: none;
    position: relative;
    box-shadow: var(--card-shadow);
    transition: transform 0.1s, box-shadow 0.1s;
  }
  .flashcard:active { transform: scale(0.98); box-shadow: 0 1px 8px rgba(0,0,0,0.04); }
  .flashcard .tap-hint {
    position: absolute; bottom: 16px;
    font-size: 11px; color: var(--text3);
    font-family: var(--font-mono);
    letter-spacing: 0.04em;
  }

  .card-face-0 { /* question */ }
  .card-face-1 { /* revealed */ }
  .card-face-2 { /* detail */ }

  .card-jp {
    font-size: 52px;
    font-weight: 700;
    letter-spacing: 0.05em;
    text-align: center;
    line-height: 1.2;
    margin-bottom: 8px;
    color: var(--text);
  }
  .card-jp.sm { font-size: 36px; }
  .card-kana {
    font-size: 22px;
    color: var(--text2);
    margin-bottom: 6px;
    text-align: center;
  }
  .card-en {
    font-size: 22px;
    font-weight: 500;
    text-align: center;
    color: var(--accent2);
    margin-bottom: 4px;
  }
  .card-example {
    font-size: 15px;
    color: var(--text2);
    text-align: center;
    line-height: 1.7;
    border-top: 1px solid var(--border);
    padding-top: 16px;
    margin-top: 12px;
  }
  .card-example .ex-en {
    font-size: 12px;
    color: var(--text3);
    margin-top: 4px;
  }
  .card-tag {
    position: absolute; top: 14px; right: 14px;
    font-size: 10px;
    font-family: var(--font-mono);
    padding: 3px 8px;
    border-radius: 20px;
    background: var(--bg3);
    color: var(--text3);
    letter-spacing: 0.04em;
  }

  .study-actions {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 10px; margin-top: 16px;
  }
  .study-btn {
    padding: 14px;
    border-radius: var(--radius);
    border: 1.5px solid;
    font-family: var(--font-jp);
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-knew {
    background: var(--bg);
    border-color: var(--accent3);
    color: var(--accent3);
  }
  .btn-knew:hover { background: #f0fdf4; }
  .btn-retry {
    background: var(--bg);
    border-color: var(--accent);
    color: var(--accent);
  }
  .btn-retry:hover { background: #fef2f2; }

  /* BLITZ MODE */
  #blitz-area { padding: 0 20px 100px; }
  .blitz-timer-ring {
    display: flex; align-items: center; justify-content: center;
    width: 100px; height: 100px;
    border-radius: 50%;
    border: 5px solid var(--accent);
    font-family: var(--font-mono);
    font-size: 32px;
    font-weight: 700;
    color: var(--accent);
    margin: 0 auto 20px;
    transition: border-color 0.3s, color 0.3s;
  }
  .blitz-timer-ring.warning { border-color: #f97316; color: #f97316; }
  .blitz-timer-ring.danger { border-color: var(--accent); color: var(--accent); animation: pulse 0.5s infinite; }

  .blitz-score {
    text-align: center;
    font-family: var(--font-mono);
    font-size: 13px;
    color: var(--text2);
    margin-bottom: 20px;
    letter-spacing: 0.05em;
  }
  .blitz-score .pts { font-size: 28px; font-weight: 700; color: var(--text); }

  .multiplier-badge {
    display: inline-block;
    background: var(--accent);
    color: white;
    font-family: var(--font-mono);
    font-size: 14px;
    font-weight: 700;
    padding: 4px 12px;
    border-radius: 20px;
    margin-left: 8px;
    animation: pop 0.2s ease;
  }
  .multiplier-badge.x3 { background: #f97316; }
  @keyframes pop { 0% { transform: scale(0.8); } 100% { transform: scale(1); } }

  .blitz-card {
    background: var(--bg);
    border: 2px solid var(--border);
    border-radius: 20px;
    padding: 32px 24px;
    text-align: center;
    box-shadow: var(--card-shadow);
    min-height: 200px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    margin-bottom: 16px;
  }
  .blitz-choices {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .choice-btn {
    padding: 14px 8px;
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    background: var(--bg2);
    cursor: pointer;
    font-family: var(--font-jp);
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    transition: all 0.12s;
  }
  .choice-btn:hover { background: var(--bg3); }
  .choice-btn.correct { background: #f0fdf4; border-color: var(--accent3); color: var(--accent3); }
  .choice-btn.wrong { background: #fef2f2; border-color: var(--accent); color: var(--accent); }
  .choice-btn:disabled { cursor: default; }

  /* GHOST MODE */
  .ghost-banner {
    display: flex; align-items: center; gap: 8px;
    background: var(--bg3);
    border: 1px dashed rgba(0,0,0,0.15);
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 12px;
    color: var(--text2);
    font-family: var(--font-mono);
    margin-bottom: 16px;
    letter-spacing: 0.03em;
  }
  .ghost-icon { font-size: 16px; opacity: 0.6; }

  /* START SCREEN */
  .start-screen {
    text-align: center;
    padding: 40px 20px;
  }
  .start-screen h2 {
    font-size: 28px;
    font-weight: 700;
    margin-bottom: 8px;
  }
  .start-screen p {
    font-size: 15px;
    color: var(--text2);
    margin-bottom: 32px;
  }
  .start-btn {
    display: block;
    width: 100%;
    padding: 18px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: var(--radius);
    font-family: var(--font-jp);
    font-size: 18px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.05em;
  }
  .start-btn:hover { background: #c73333; transform: translateY(-1px); }
  .start-btn.ghost { background: var(--bg3); color: var(--text2); margin-top: 10px; border: 1.5px solid var(--border); }
  .start-btn.ghost:hover { background: var(--bg2); }

  /* RESULTS */
  .results-screen {
    padding: 40px 20px;
    text-align: center;
  }
  .results-score-big {
    font-family: var(--font-mono);
    font-size: 72px;
    font-weight: 700;
    color: var(--accent);
    line-height: 1;
    margin-bottom: 8px;
  }
  .results-label { font-size: 14px; color: var(--text3); margin-bottom: 24px; }
  .results-stats {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 12px; margin-bottom: 28px;
  }
  .stat-card {
    background: var(--bg2);
    border-radius: var(--radius);
    padding: 14px 8px;
  }
  .stat-val { font-family: var(--font-mono); font-size: 20px; font-weight: 700; color: var(--text); }
  .stat-lbl { font-size: 11px; color: var(--text3); margin-top: 2px; }
  .pb-badge {
    background: #fef3c7;
    border: 1.5px solid #fbbf24;
    border-radius: 10px;
    padding: 10px 16px;
    font-size: 13px;
    color: var(--gold);
    font-weight: 700;
    margin-bottom: 20px;
    display: inline-block;
  }

  /* XP POPUP */
  .xp-popup {
    position: fixed;
    top: 60px; right: 20px;
    background: var(--text);
    color: white;
    font-family: var(--font-mono);
    font-size: 13px;
    font-weight: 700;
    padding: 8px 14px;
    border-radius: 20px;
    z-index: 200;
    animation: floatUp 1.5s ease forwards;
    pointer-events: none;
  }
  @keyframes floatUp {
    0% { opacity: 1; transform: translateY(0); }
    100% { opacity: 0; transform: translateY(-40px); }
  }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 80px; left: 50%; transform: translateX(-50%);
    background: var(--text);
    color: white;
    font-family: var(--font-jp);
    font-size: 14px;
    padding: 10px 20px;
    border-radius: 20px;
    z-index: 200;
    animation: toastIn 2.5s ease forwards;
    white-space: nowrap;
  }
  @keyframes toastIn {
    0% { opacity: 0; transform: translateX(-50%) translateY(10px); }
    15% { opacity: 1; transform: translateX(-50%) translateY(0); }
    75% { opacity: 1; }
    100% { opacity: 0; transform: translateX(-50%) translateY(0); }
  }

  /* DECK COMPLETE */
  .deck-complete {
    background: #f0fdf4;
    border: 1.5px solid #86efac;
    border-radius: var(--radius);
    padding: 16px;
    text-align: center;
    margin-bottom: 16px;
  }
  .deck-complete h3 { font-size: 16px; color: var(--accent3); margin-bottom: 4px; }
  .deck-complete p { font-size: 13px; color: #4ade80; }

  .hidden { display: none !important; }

  /* PROGRESS BAR on deck tab */
  .tab-bar {
    height: 3px;
    background: var(--bg3);
    border-radius: 2px;
    margin-top: 4px;
    width: 60px;
    overflow: hidden;
  }
  .tab-bar-fill {
    height: 100%;
    background: var(--accent3);
    border-radius: 2px;
    transition: width 0.4s;
  }

  /* Household label */
  .household-tip {
    background: #eff6ff;
    border: 1px solid #bfdbfe;
    border-radius: 10px;
    padding: 12px 16px;
    font-size: 13px;
    color: #1e40af;
    margin-bottom: 16px;
    line-height: 1.6;
  }
  .household-tip strong { font-weight: 700; }

  /* DECK TAB COLORS */
  .deck-tab.verbs .tab-jp { color: #0369a1; }
  .deck-tab.verbs.active .tab-jp { color: #0369a1; }
  .deck-tab.verbs .tab-bar-fill { background: #0369a1; }
  .deck-tab.grammar .tab-jp { color: #7c3aed; }
  .deck-tab.grammar.active .tab-jp { color: #7c3aed; }
  .deck-tab.grammar .tab-bar-fill { background: #7c3aed; }
  .deck-tab.eating .tab-jp { color: #b45309; }
  .deck-tab.eating.active .tab-jp { color: #b45309; }
  .deck-tab.eating .tab-bar-fill { background: #b45309; }
  .deck-tab.wearing .tab-jp { color: #0f766e; }
  .deck-tab.wearing.active .tab-jp { color: #0f766e; }
  .deck-tab.wearing .tab-bar-fill { background: #0f766e; }
  .deck-tab.everything .tab-jp { color: #b91c1c; }
  .deck-tab.everything.active .tab-jp { color: #b91c1c; }
  .deck-tab.everything .tab-bar-fill { background: #b91c1c; }
  .deck-tab.everything .tab-en { font-weight: 700; font-size: 9px; text-transform: uppercase; letter-spacing: 0.05em; }

  /* MASTERY GAME */
  .mastery-hud {
    display: flex; align-items: center; justify-content: space-between;
    background: #fffbeb;
    border: 1.5px solid #fbbf24;
    border-radius: var(--radius);
    padding: 12px 16px;
    margin-bottom: 16px;
    font-family: var(--font-mono);
    font-size: 13px;
  }
  .mastery-hud .m-stat { text-align: center; }
  .mastery-hud .m-val { font-size: 22px; font-weight: 700; color: var(--text); line-height: 1; }
  .mastery-hud .m-lbl { font-size: 10px; color: var(--text3); margin-top: 2px; }
  .pip-row { display: flex; gap: 5px; justify-content: center; margin-top: 10px; }
  .pip {
    width: 10px; height: 10px; border-radius: 50%;
    border: 1.5px solid var(--border);
    background: var(--bg3);
    transition: background 0.2s;
  }
  .pip.filled { background: var(--accent3); border-color: var(--accent3); }
  .pip.almost { background: var(--gold); border-color: var(--gold); }
  .mastery-progress-wrap {
    height: 6px; background: var(--bg3); border-radius: 3px; margin-bottom: 20px; overflow: hidden;
  }
  .mastery-progress-bar {
    height: 100%; border-radius: 3px;
    background: linear-gradient(90deg, var(--accent3), #22d3ee);
    transition: width 0.5s ease;
  }
  .mastery-graduate {
    position: fixed; top: 40%; left: 50%; transform: translate(-50%,-50%);
    background: var(--text); color: white;
    font-family: var(--font-jp); font-size: 20px; font-weight: 700;
    padding: 20px 36px; border-radius: 24px; z-index: 300;
    animation: popFade 2.2s ease forwards;
    pointer-events: none;
    text-align: center;
    line-height: 1.5;
    box-shadow: 0 8px 32px rgba(0,0,0,0.25);
    max-width: 80vw;
  }
  .mastery-graduate.milestone-20 { background: #1e40af; }
  .mastery-graduate.milestone-10 { background: #7c3aed; }
  .mastery-graduate.milestone-5  { background: #d97706; }
  .mastery-graduate.milestone-done { background: #15803d; font-size: 22px; }
  @keyframes popFade {
    0%  { opacity: 0; transform: translate(-50%,-50%) scale(0.7); }
    15% { opacity: 1; transform: translate(-50%,-50%) scale(1.08); }
    30% { transform: translate(-50%,-50%) scale(1); }
    75% { opacity: 1; transform: translate(-50%,-50%) scale(1); }
    100%{ opacity: 0; transform: translate(-50%,-50%) scale(1); }
  }
  .mastery-complete {
    text-align: center; padding: 40px 20px;
  }
  .mastery-complete .trophy { font-size: 64px; margin-bottom: 16px; }
  .mastery-complete h2 { font-size: 26px; font-weight: 700; margin-bottom: 8px; }
  .mastery-complete p { font-size: 15px; color: var(--text2); margin-bottom: 28px; line-height: 1.7; }

  /* AUDIO TOGGLE */
  #audio-toggle {
    background: none;
    border: 1.5px solid var(--border);
    border-radius: 20px;
    padding: 4px 10px;
    font-size: 15px;
    cursor: pointer;
    transition: all 0.15s;
    line-height: 1;
  }
  #audio-toggle:hover { background: var(--bg2); }
  #audio-toggle.off { opacity: 0.35; }

  /* SPEAK BUTTON on cards */
  .speak-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    background: none;
    border: 1.5px solid var(--border);
    border-radius: 50%;
    width: 36px; height: 36px;
    font-size: 16px;
    cursor: pointer;
    margin-top: 10px;
    transition: all 0.15s;
    color: var(--text2);
  }
  .speak-btn:hover { background: var(--bg2); border-color: var(--accent2); }
  .speak-btn.speaking { border-color: var(--accent2); color: var(--accent2); animation: pulse 0.8s infinite; }

  /* LISTEN / AUDIO STUDY MODE */
  #listen-area { padding: 0 20px 100px; }

  .listen-player {
    background: var(--bg);
    border: 1.5px solid var(--border);
    border-radius: 20px;
    padding: 28px 24px;
    box-shadow: var(--card-shadow);
    margin-bottom: 16px;
  }
  .listen-word {
    font-size: 52px;
    font-weight: 700;
    text-align: center;
    color: var(--text);
    line-height: 1.2;
    margin-bottom: 8px;
    min-height: 70px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .listen-word.sm { font-size: 32px; }
  .listen-reading {
    font-size: 16px;
    color: var(--text2);
    text-align: center;
    margin-bottom: 6px;
    min-height: 24px;
  }
  .listen-english {
    font-size: 18px;
    font-weight: 500;
    color: var(--accent2);
    text-align: center;
    margin-bottom: 12px;
    min-height: 28px;
  }
  .listen-example {
    font-size: 14px;
    color: var(--text2);
    text-align: center;
    line-height: 1.7;
    border-top: 1px solid var(--border);
    padding-top: 12px;
    margin-top: 4px;
    min-height: 44px;
  }
  .listen-example .ex-en {
    font-size: 12px;
    color: var(--text3);
    margin-top: 4px;
  }
  .listen-phase {
    text-align: center;
    font-family: var(--font-mono);
    font-size: 11px;

      { q: 'あたらしいあかいシャツがいいですね。', kana: 'あたらしい あかい シャツが いいですね。', en: 'I like your new red shirt!', ex: 'i-adj + i-adj + noun (stacked adjectives)', exen: 'あたらしい + あかい + シャツ' },
      { q: 'ホセはくろいシャツをきて、きいろいぼうしをかぶっています。', kana: 'ホセは くろい シャツを きて、きいろい ぼうしを かぶっています。', en: 'Jose is wearing a black shirt and a yellow hat.', ex: 'きて = te-form links two wearing actions', exen: 'connect actions with te-form' },
    ]
  },
];

// ===== VIRTUAL DECKS (aggregates) =====
const ALL_IDS = ['verbs','grammar','eating','wearing'];

function buildVirtualDeck(ids, id, jp, en, tag) {
  const cards = [];
  ids.forEach(did => {
    const deck = DECKS.find(d => d.id === did);
    if (deck) deck.cards.forEach((c, ci) => {
      cards.push({ ...c, _sourceId: did, _sourceIdx: ci });
    });
  });
  return { id, jp, en, tag, virtual: true, cards };
}

const VIRTUAL_DECKS = [
  buildVirtualDeck(ALL_IDS, 'everything', 'すべて', 'EVERYTHING', 'everything'),
];
const ALL_DECKS = [...DECKS, ...VIRTUAL_DECKS];

// ===== STATE =====
const XP_PER_LEVEL = 100;
let state = JSON.parse(localStorage.getItem('tangoState') || 'null') || {
  xp: 0, level: 1,
  streak: 0, bestStreak: 0,
  progress: {}, // deckId -> set of known indices
  bestBlitz: {}, // deckId -> best score
  mastery: {}, // 'deckId:cardIdx' -> correct count (0-3)
};
// Ensure progress is sets (JSON doesn't serialize Sets)
Object.keys(state.progress).forEach(k => {
  state.progress[k] = new Set(state.progress[k]);
});

let currentDeck = 0;
let currentMode = 'study';

// Study mode state
let studyQueue = [];
let studyIndex = 0;
let cardFace = 0;

// Blitz mode state
let blitzActive = false;
let blitzTimer = null;
let blitzSeconds = 60;
let blitzScore = 0;
let blitzStreak = 0;
let blitzCorrect = 0;
let blitzTotal = 0;
let blitzQueue = [];
let blitzQueueIdx = 0;
let blitzGhostScore = 0;
let blitzGhostMode = false;
let blitzCurrentChoices = [];
let blitzAnswerLocked = false;

function saveState() {
  const toSave = { ...state };
  toSave.progress = {};
  Object.keys(state.progress).forEach(k => {
    toSave.progress[k] = [...state.progress[k]];
  });
  localStorage.setItem('tangoState', JSON.stringify(toSave));
}

// ===== DECK TABS =====
function renderTabs() {
  const container = document.getElementById('deck-tabs');
  container.innerHTML = ALL_DECKS.map((d, i) => {
    let prog, total, pct, mastered;
    if (d.virtual && d.id === 'everything') {
      total = d.cards.length;
      const m = state.mastery || {};
      prog = d.cards.filter(c => (m[c._sourceId + ':' + c._sourceIdx] || 0) >= 3).length;
      pct = Math.round(prog / total * 100);
      mastered = prog === total;
    } else {
      prog = state.progress[d.id] ? state.progress[d.id].size : 0;
      total = d.cards.length;
      pct = Math.round(prog / total * 100);
      mastered = prog === total;
    }
    const tagClass = d.tag ? ' ' + d.tag : '';
    return `<button class="deck-tab${i === currentDeck ? ' active' : ''}${mastered ? ' mastered' : ''}${tagClass}" onclick="switchDeck(${i})">
      <span class="tab-jp">${d.jp}</span>
      <span class="tab-en">${d.en}</span>
      <div class="tab-bar"><div class="tab-bar-fill" style="width:${pct}%"></div></div>
      <span class="tab-prog">${prog}/${total}</span>
    </button>`;
  }).join('');
}

function switchDeck(i) {
  currentDeck = i;
  renderTabs();
  const deck = ALL_DECKS[i];
  // Stop audio when switching decks
  if (window.speechSynthesis) window.speechSynthesis.cancel();
  listenPlaying = false;
  if (listenTimeout) { clearTimeout(listenTimeout); listenTimeout = null; }

  const mArea = document.getElementById('mastery-area');
  document.getElementById('listen-area').classList.add('hidden');

  if (deck && deck.id === 'everything') {
    document.getElementById('mode-bar').classList.add('hidden');
    document.getElementById('study-area').classList.add('hidden');
    document.getElementById('blitz-area').classList.add('hidden');
    renderMasteryGame();
  } else {
    document.getElementById('mode-bar').classList.remove('hidden');
    if (mArea) mArea.classList.add('hidden');
    if (currentMode === 'study') {
      document.getElementById('study-area').classList.remove('hidden');
      document.getElementById('blitz-area').classList.add('hidden');
      renderStudy();
    } else if (currentMode === 'blitz') {
      document.getElementById('study-area').classList.add('hidden');
      document.getElementById('blitz-area').classList.remove('hidden');
      renderBlitzStart();
    } else if (currentMode === 'listen') {
      document.getElementById('listen-area').classList.remove('hidden');
      renderListenMode();
    }
  }
}

// ===== HUD =====
function updateHUD() {
  document.getElementById('hud-xp').textContent = state.xp + ' XP';
  document.getElementById('level-badge').textContent = 'LV' + state.level;
  const pct = ((state.xp % XP_PER_LEVEL) / XP_PER_LEVEL * 100).toFixed(1);
  document.getElementById('xp-bar').style.width = pct + '%';
  const el = document.getElementById('streak-display');
  el.textContent = '🔥' + state.streak;
  el.className = 'streak-display' + (state.streak >= 3 ? ' hot' : '');
}

function addXP(amount) {
  state.xp += amount;
  const newLevel = Math.floor(state.xp / XP_PER_LEVEL) + 1;
  if (newLevel > state.level) {
    state.level = newLevel;
    showToast('レベルアップ！LV' + state.level + ' 🎉');
  }
  updateHUD();
  saveState();
  showXPPopup('+' + amount + ' XP');
}

function showXPPopup(text) {
  const el = document.createElement('div');
  el.className = 'xp-popup';
  el.textContent = text;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1600);
}

function showToast(msg) {
  const el = document.createElement('div');
  el.className = 'toast';
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 2600);
}

// ===== MODE SWITCHER =====
function setMode(mode) {
  currentMode = mode;
  // Stop any playing audio when switching modes
  if (window.speechSynthesis) window.speechSynthesis.cancel();
  listenPlaying = false;
  if (listenTimeout) { clearTimeout(listenTimeout); listenTimeout = null; }

  document.getElementById('btn-study').className = 'mode-btn' + (mode === 'study' ? ' active' : '');
  document.getElementById('btn-blitz').className = 'mode-btn' + (mode === 'blitz' ? ' active' : '');
  document.getElementById('btn-listen').className = 'mode-btn' + (mode === 'listen' ? ' active' : '');

  const mAreaSM = document.getElementById('mastery-area');
  if (mAreaSM) mAreaSM.classList.add('hidden');

  document.getElementById('study-area').classList.add('hidden');
  document.getElementById('blitz-area').classList.add('hidden');
  document.getElementById('listen-area').classList.add('hidden');

  if (mode === 'study') {
    document.getElementById('study-area').classList.remove('hidden');
    renderStudy();
  } else if (mode === 'blitz') {
    document.getElementById('blitz-area').classList.remove('hidden');
    renderBlitzStart();
  } else if (mode === 'listen') {
    document.getElementById('listen-area').classList.remove('hidden');
    renderListenMode();
  }
}

// ===== STUDY MODE =====
function buildStudyQueue() {
  const deck = ALL_DECKS[currentDeck];
  const known = state.progress[deck.id] || new Set();
  // Put unknown cards first, then known cards at the end for review
  const unknown = deck.cards.map((c,i) => i).filter(i => !known.has(i));
  const knownArr = [...known];
  studyQueue = [...unknown, ...knownArr];
  studyIndex = 0;
}

function renderStudy() {
  buildStudyQueue();
  cardFace = 0;
  renderStudyCard();
}

function renderStudyCard() {
  const deck = ALL_DECKS[currentDeck];
  const area = document.getElementById('study-area');
  if (studyQueue.length === 0) {
    area.innerHTML = '<div style="padding:40px 20px;text-align:center;color:var(--text2)">このデッキにカードがありません。</div>';
    return;
  }

  const known = state.progress[deck.id] || new Set();
  const allKnown = known.size === deck.cards.length;

  let tipHtml = '';
  if (deck.tip) {
    tipHtml = `<div class="household-tip"><strong>おかあさんと！</strong><br>${deck.tip}</div>`;
  }

  let completeBanner = '';
  if (allKnown) {
    completeBanner = `<div class="deck-complete"><h3>✓ デッキかんりょう！</h3><p>All ${deck.cards.length} words mastered — keep reviewing!</p></div>`;
  }

  const cardIdx = studyQueue[studyIndex];
  const card = deck.cards[cardIdx];
  const isKnown = known.has(cardIdx);
  const counter = `${studyIndex + 1} / ${studyQueue.length}`;
  const tagLabel = isKnown ? '✓ known' : 'new';

  let cardContent = '';
  if (cardFace === 0) {
    cardContent = `
      <span class="card-tag">${tagLabel}</span>
      <div class="card-jp${card.q.length > 4 ? ' sm' : ''}">${card.q}</div>
      <button class="speak-btn" id="speak-btn" onclick="event.stopPropagation();speakJapanese('${card.q.replace(/'/g,'')}')">🔊</button>
      <div class="tap-hint">tap to reveal →</div>
    `;
  } else if (cardFace === 1) {
    cardContent = `
      <span class="card-tag">${tagLabel}</span>
      <div class="card-jp${card.q.length > 4 ? ' sm' : ''}">${card.q}</div>
      <div class="card-kana">${card.kana}</div>
      <div class="card-en">${card.en}</div>
      <button class="speak-btn" id="speak-btn" onclick="event.stopPropagation();speakJapanese('${card.q.replace(/'/g,'')}')">🔊</button>
      <div class="tap-hint">tap for example →</div>
    `;
  } else {
    cardContent = `
      <span class="card-tag">${tagLabel}</span>
      <div class="card-jp${card.q.length > 4 ? ' sm' : ''}">${card.q}</div>
      <div class="card-en">${card.en}</div>
      <div class="card-example">${card.ex}<div class="ex-en">${card.exen}</div></div>
      <button class="speak-btn" id="speak-btn" onclick="event.stopPropagation();speakJapanese('${card.ex.replace(/'/g,'')}')">🔊</button>
    `;
  }

  const actionsHtml = cardFace === 2 ? `
    <div class="study-actions">
      <button class="study-btn btn-knew" onclick="markKnew()">✓ わかった</button>
      <button class="study-btn btn-retry" onclick="markRetry()">↩ もういちど</button>
    </div>
  ` : '';

  area.innerHTML = `
    ${tipHtml}
    ${completeBanner}
    <div class="card-counter">${counter}</div>
    <div class="flashcard" onclick="advanceCard()">
      ${cardContent}
    </div>
    ${actionsHtml}
  `;
  // Auto-speak the Japanese word on face 0
  if (cardFace === 0) autoSpeak(card.q);
}

function advanceCard() {
  if (cardFace < 2) { cardFace++; renderStudyCard(); }
}

function markKnew() {
  const deck = ALL_DECKS[currentDeck];
  if (!state.progress[deck.id]) state.progress[deck.id] = new Set();
  const cardIdx = studyQueue[studyIndex];
  const wasNew = !state.progress[deck.id].has(cardIdx);
  state.progress[deck.id].add(cardIdx);
  state.streak++;
  if (state.streak > state.bestStreak) state.bestStreak = state.streak;
  saveState();
  renderTabs();
  updateHUD();
  if (wasNew) addXP(10);
  else addXP(3);
  nextStudyCard();
}

function markRetry() {
  state.streak = 0;
  updateHUD();
  saveState();
  // Move card to end of queue
  const idx = studyQueue.splice(studyIndex, 1)[0];
  studyQueue.push(idx);
  cardFace = 0;
  renderStudyCard();
}

function nextStudyCard() {
  studyIndex++;
  if (studyIndex >= studyQueue.length) studyIndex = 0;
  cardFace = 0;
  renderStudyCard();
}

// ===== BLITZ MODE =====
function renderBlitzStart() {
  const deck = ALL_DECKS[currentDeck];
  const best = state.bestBlitz[deck.id] || 0;
  const ghostHtml = best > 0 ? `
    <div class="ghost-banner">
      <span class="ghost-icon">👻</span>
      <span>ゴーストモード available — beat your best: <strong>${best} pts</strong></span>
    </div>
  ` : '';

  document.getElementById('blitz-area').innerHTML = `
    <div class="start-screen">
      <h2>⚡ ブリッツモード</h2>
      <p>60秒で できるだけ たくさんこたえよう！<br>Streak multipliers: 🔥×2 at 3, 🔥×3 at 5!</p>
      ${ghostHtml}
      <button class="start-btn" onclick="startBlitz(false)">スタート！</button>
      ${best > 0 ? `<button class="start-btn ghost" onclick="startBlitz(true)">👻 ゴーストモード (best: ${best})</button>` : ''}
    </div>
  `;
}

function buildBlitzQueue() {
  const deck = ALL_DECKS[currentDeck];
  // Shuffle all cards
  blitzQueue = deck.cards.map((c, i) => i).sort(() => Math.random() - 0.5);
  blitzQueueIdx = 0;
}

function startBlitz(ghostMode) {
  blitzActive = true;
  blitzSeconds = 60;
  blitzScore = 0;
  blitzStreak = 0;
  blitzCorrect = 0;
  blitzTotal = 0;
  blitzGhostMode = ghostMode;
  blitzGhostScore = state.bestBlitz[ALL_DECKS[currentDeck].id] || 0;
  buildBlitzQueue();
  renderBlitzRound();
  blitzTimer = setInterval(blitzTick, 1000);
}

function blitzTick() {
  blitzSeconds--;
  if (blitzSeconds <= 0) {
    clearInterval(blitzTimer);
    blitzActive = false;
    showBlitzResults();
    return;
  }
  // Update timer display without full re-render
  const timerEl = document.getElementById('blitz-timer');
  if (timerEl) {
    timerEl.textContent = blitzSeconds;
    timerEl.className = 'blitz-timer-ring' + (blitzSeconds <= 10 ? ' danger' : blitzSeconds <= 20 ? ' warning' : '');
  }
}

function getMultiplier() {
  if (blitzStreak >= 5) return 3;
  if (blitzStreak >= 3) return 2;
  return 1;
}

function renderBlitzRound() {
  if (!blitzActive) return;
  const deck = ALL_DECKS[currentDeck];
  if (blitzQueueIdx >= blitzQueue.length) {
    buildBlitzQueue();
  }
  const cardIdx = blitzQueue[blitzQueueIdx];
  const card = deck.cards[cardIdx];
  blitzAnswerLocked = false;

  // Build choices: correct + 3 wrong
  const allIndices = deck.cards.map((_,i) => i).filter(i => i !== cardIdx);
  const wrongs = allIndices.sort(() => Math.random() - 0.5).slice(0, 3);
  const choices = [cardIdx, ...wrongs].sort(() => Math.random() - 0.5);
  blitzCurrentChoices = choices;

  const mult = getMultiplier();
  const multBadge = mult > 1 ? `<span class="multiplier-badge${mult === 3 ? ' x3' : ''}">×${mult}</span>` : '';

  const ghostLine = blitzGhostMode ? `
    <div class="ghost-banner">
      <span class="ghost-icon">👻</span>
      <span>Ghost: ${blitzGhostScore} pts | You: ${blitzScore} pts</span>
    </div>
  ` : '';

  const mult_note = mult > 1 ? `<div style="text-align:center;font-size:12px;color:var(--accent);font-family:var(--font-mono);margin-bottom:8px;">🔥 Streak ×${mult}!</div>` : '';

  document.getElementById('blitz-area').innerHTML = `
    <div id="blitz-timer" class="blitz-timer-ring${blitzSeconds <= 10 ? ' danger' : blitzSeconds <= 20 ? ' warning' : ''}">${blitzSeconds}</div>
    <div class="blitz-score">
      <div class="pts">${blitzScore}</div>
      <div>pts${multBadge}</div>
    </div>
    ${ghostLine}
    ${mult_note}
    <div class="blitz-card" style="cursor:default;">
      <div class="card-jp${card.q.length > 4 ? ' sm' : ''}">${card.q}</div>
      <button class="speak-btn" onclick="speakJapanese('${deck.cards[cardIdx].q.replace(/'/g,'')}')">🔊</button>
    </div>
    <div class="blitz-choices">
      ${choices.map((ci, i) => `
        <button class="choice-btn" id="choice-${i}" onclick="blitzAnswer(${i}, ${ci === cardIdx})">${deck.cards[ci].en}</button>
      `).join('')}
    </div>
  `;
}

function blitzAnswer(btnIdx, correct) {
  if (blitzAnswerLocked) return;
  blitzAnswerLocked = true;
  blitzTotal++;

  const btn = document.getElementById('choice-' + btnIdx);
  if (correct) {
    btn.className = 'choice-btn correct';
    blitzStreak++;
    blitzCorrect++;
    const mult = getMultiplier();
    blitzScore += 10 * mult;
    state.streak++;
    if (state.streak > state.bestStreak) state.bestStreak = state.streak;
    updateHUD();
    addXP(5 * mult);
  } else {
    btn.className = 'choice-btn wrong';
    blitzStreak = 0;
    state.streak = 0;
    updateHUD();
    // Show correct answer
    blitzCurrentChoices.forEach((ci, i) => {
      if (ci === blitzCurrentChoices.find((c, j) => {
        const deck = ALL_DECKS[currentDeck];
        return deck.cards[c] && blitzCurrentChoices.indexOf(c) === blitzCurrentChoices.findIndex(x => {
          return ALL_DECKS[currentDeck].cards[x].en === ALL_DECKS[currentDeck].cards[blitzQueue[blitzQueueIdx]].en;
        });
      })) {
        const cb = document.getElementById('choice-' + i);
        if (cb) cb.className = 'choice-btn correct';
      }
    });
    // Find and highlight correct
    const deck = ALL_DECKS[currentDeck];
    const correctCard = deck.cards[blitzQueue[blitzQueueIdx]];
    blitzCurrentChoices.forEach((ci, i) => {
      if (deck.cards[ci].en === correctCard.en) {
        const cb = document.getElementById('choice-' + i);
        if (cb) cb.className = 'choice-btn correct';
      }
    });
  }
  blitzQueueIdx++;
  setTimeout(() => {
    if (blitzActive) renderBlitzRound();
  }, 600);
}

function showBlitzResults() {
  const deck = ALL_DECKS[currentDeck];
  const prevBest = state.bestBlitz[deck.id] || 0;
  const isNewPB = blitzScore > prevBest;
  if (isNewPB) state.bestBlitz[deck.id] = blitzScore;
  saveState();

  const acc = blitzTotal > 0 ? Math.round(blitzCorrect / blitzTotal * 100) : 0;
  const pbHtml = isNewPB ? `<div class="pb-badge">🏆 新記録！Personal Best: ${blitzScore} pts</div><br>` : '';

  document.getElementById('blitz-area').innerHTML = `
    <div class="results-screen">
      <div class="results-score-big">${blitzScore}</div>
      <div class="results-label">points — ${deck.jp} (${deck.en})</div>
      ${pbHtml}
      <div class="results-stats">
        <div class="stat-card"><div class="stat-val">${blitzCorrect}</div><div class="stat-lbl">correct</div></div>
        <div class="stat-card"><div class="stat-val">${acc}%</div><div class="stat-lbl">accuracy</div></div>
        <div class="stat-card"><div class="stat-val">${prevBest}</div><div class="stat-lbl">best</div></div>
      </div>
      <button class="start-btn" onclick="startBlitz(false)">もう一回！</button>
      ${prevBest > 0 ? `<button class="start-btn ghost" onclick="startBlitz(true)" style="margin-top:10px;">👻 ゴーストモード</button>` : ''}
    </div>
  `;
}


// ===== MASTERY GAME (EVERYTHING mode) =====
let masteryQueue = [];
let masteryCurrentIdx = 0;
let masteryChoicesLocked = false;
let masteryLastRemaining = -1;

function getMasteryKey(card) {
  return card._sourceId + ':' + card._sourceIdx;
}

function getMasteryCount(card) {
  return (state.mastery || {})[getMasteryKey(card)] || 0;
}

function buildMasteryQueue() {
  const deck = ALL_DECKS.find(d => d.id === 'everything');
  if (!state.mastery) state.mastery = {};
  // Only cards not yet mastered (< 3 correct)
  masteryQueue = deck.cards
    .filter(c => getMasteryCount(c) < 3)
    .sort(() => Math.random() - 0.5);
}

function getMasteryRemaining() {
  const deck = ALL_DECKS.find(d => d.id === 'everything');
  if (!state.mastery) state.mastery = {};
  return deck.cards.filter(c => getMasteryCount(c) < 3).length;
}

function showMilestoneBanner(remaining) {
  const prev = masteryLastRemaining;
  masteryLastRemaining = remaining;

  let msg = null;
  if (remaining <= 0) {
    msg = 'You did it! よくできました！🎉';
  } else if (remaining <= 5 && (prev === -1 || prev > 5)) {
    msg = "You're almost there! あと５つ！";
  } else if (remaining <= 10 && (prev === -1 || prev > 10)) {
    msg = 'Only 10 more! もう少し！';
  } else if (remaining <= 20 && (prev === -1 || prev > 20)) {
    msg = 'Only 20 to go! がんばって！';
  }

  if (msg) {
    const el = document.createElement('div');
    let cls = 'mastery-graduate';
    if (remaining <= 0) cls += ' milestone-done';
    else if (remaining <= 5) cls += ' milestone-5';
    else if (remaining <= 10) cls += ' milestone-10';
    else if (remaining <= 20) cls += ' milestone-20';
    el.className = cls;
    el.innerHTML = msg;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), remaining <= 0 ? 3500 : 2400);
  }
}

function renderMasteryGame() {
  document.getElementById('study-area').classList.add('hidden');
  document.getElementById('blitz-area').classList.add('hidden');

  let el = document.getElementById('mastery-area');
  if (!el) {
    el = document.createElement('div');
    el.id = 'mastery-area';
    el.style.cssText = 'padding: 0 20px 100px;';
    document.getElementById('main').appendChild(el);
  }
  el.classList.remove('hidden');

  buildMasteryQueue();
  const remaining = getMasteryRemaining();
  masteryLastRemaining = remaining;

  if (remaining === 0) {
    showMasteryComplete(el);
    return;
  }

  masteryCurrentIdx = 0;
  renderMasteryCard(el);
}

function renderMasteryCard(container) {
  if (!container) container = document.getElementById('mastery-area');
  const remaining = getMasteryRemaining();
  const deck = ALL_DECKS.find(d => d.id === 'everything');
  const total = deck.cards.length;
  const graduated = total - remaining;
  const pct = Math.round(graduated / total * 100);

  if (masteryCurrentIdx >= masteryQueue.length) {
    // Reshuffle remaining
    buildMasteryQueue();
    masteryCurrentIdx = 0;
    if (masteryQueue.length === 0) { showMasteryComplete(container); return; }
  }

  const card = masteryQueue[masteryCurrentIdx];
  const hits = getMasteryCount(card);
  masteryChoicesLocked = false;

  // Build 3 wrong choices from all_decks everything pool
  const allCards = deck.cards;
  const others = allCards.filter(c => getMasteryKey(c) !== getMasteryKey(card));
  const wrongs = others.sort(() => Math.random() - 0.5).slice(0, 3);
  const choices = [card, ...wrongs].sort(() => Math.random() - 0.5);

  const pips = [0,1,2].map(i =>
    `<div class="pip${hits > i ? (hits === 2 ? ' almost' : ' filled') : ''}"></div>`
  ).join('');

  const _masteryCard = masteryQueue[masteryCurrentIdx];
  container.innerHTML = `
    <div class="mastery-progress-wrap">
      <div class="mastery-progress-bar" style="width:${pct}%"></div>
    </div>
    <div class="mastery-hud">
      <div class="m-stat"><div class="m-val">${graduated}</div><div class="m-lbl">graduated</div></div>
      <div class="m-stat"><div class="m-val">${remaining}</div><div class="m-lbl">remaining</div></div>
      <div class="m-stat"><div class="m-val">${total}</div><div class="m-lbl">total</div></div>
    </div>
    <div class="card-counter">この カード: ${hits}/3 correct</div>
    <div class="pip-row">${pips}</div>
    <div style="margin-top:14px"></div>
    <div class="blitz-card" style="cursor:default;">
      <div style="font-size:11px;font-family:var(--font-mono);color:var(--text3);margin-bottom:8px;">${card.kana}</div>
      <div class="card-jp${card.q.length > 5 ? ' sm' : ''}">${card.q}</div>
      <button class="speak-btn" onclick="speakJapanese('${card.q.replace(/'/g,'')}')">🔊</button>
    </div>
    <div class="blitz-choices" id="mastery-choices">
      ${choices.map((c, i) => `
        <button class="choice-btn" id="mc-${i}" onclick="masteryAnswer(${i}, '${getMasteryKey(c)}', '${getMasteryKey(card)}')">${c.en}</button>
      `).join('')}
    </div>
    <div style="margin-top:16px;text-align:center;">
      <button onclick="resetMastery()" style="font-size:11px;font-family:var(--font-mono);color:var(--text3);background:none;border:none;cursor:pointer;text-decoration:underline;">reset progress</button>
    </div>
  `;
  autoSpeak(_masteryCard.q);
}

function masteryAnswer(btnIdx, chosenKey, correctKey) {
  if (masteryChoicesLocked) return;
  masteryChoicesLocked = true;

  const btn = document.getElementById('mc-' + btnIdx);
  const correct = chosenKey === correctKey;

  if (correct) {
    btn.className = 'choice-btn correct';
    if (!state.mastery) state.mastery = {};
    const card = masteryQueue[masteryCurrentIdx];
    const key = getMasteryKey(card);
    state.mastery[key] = Math.min(3, (state.mastery[key] || 0) + 1);
    const newCount = state.mastery[key];

    state.streak++;
    if (state.streak > state.bestStreak) state.bestStreak = state.streak;
    updateHUD();
    addXP(newCount === 3 ? 20 : 8); // bonus XP for graduating a card

    saveState();
    renderTabs();

    const remaining = getMasteryRemaining();
    showMilestoneBanner(remaining);

    if (remaining === 0) {
      setTimeout(() => {
        const container = document.getElementById('mastery-area');
        if (container) showMasteryComplete(container);
      }, 800);
      return;
    }

    // If card graduated (hit 3), remove from queue
    if (newCount >= 3) {
      masteryQueue.splice(masteryCurrentIdx, 1);
      if (masteryCurrentIdx >= masteryQueue.length) masteryCurrentIdx = 0;
    } else {
      masteryCurrentIdx++;
    }
  } else {
    btn.className = 'choice-btn wrong';
    // Reset mastery count for this card back to 0 on wrong answer
    const card = masteryQueue[masteryCurrentIdx];
    const key = getMasteryKey(card);
    if (state.mastery && state.mastery[key] > 0) {
      state.mastery[key] = 0;
      saveState();
      renderTabs();
    }
    state.streak = 0;
    updateHUD();
    // Show correct answer highlighted
    for (let i = 0; i < 4; i++) {
      const b = document.getElementById('mc-' + i);
      if (b && b.dataset && b.getAttribute('onclick') && b.getAttribute('onclick').includes("'" + correctKey + "', '" + correctKey + "'")) {
        b.className = 'choice-btn correct';
      }
    }
    // Simpler: find which button has correctKey as its chosen key
    document.querySelectorAll('#mastery-choices .choice-btn').forEach((b, i) => {
      const onclick = b.getAttribute('onclick') || '';
      if (onclick.includes("'" + correctKey + "', '" + correctKey + "'")) {
        b.className = 'choice-btn correct';
      }
    });
    masteryCurrentIdx++;
  }

  setTimeout(() => {
    const container = document.getElementById('mastery-area');
    if (container) renderMasteryCard(container);
  }, 700);
}

function showMasteryComplete(container) {
  container.innerHTML = `
    <div class="mastery-complete">
      <div class="trophy">🏆</div>
      <h2>よくできました！</h2>
      <p>You mastered all ${ALL_DECKS.find(d=>d.id==='everything').cards.length} cards!<br>
      Every single word and grammar pattern — 3 correct each.<br>
      <strong>すごい！ (Amazing!)</strong></p>
      <button class="start-btn" onclick="resetMastery()">もう一回！ Play again</button>
    </div>
  `;
}

function resetMastery() {
  state.mastery = {};
  masteryLastRemaining = -1;
  saveState();
  renderTabs();
  renderMasteryGame();
}


// ===== AUDIO ENGINE =====
let audioOn = localStorage.getItem('audioOn') !== 'false'; // default ON
let currentUtterance = null;

function updateAudioToggle() {
  const btn = document.getElementById('audio-toggle');
  if (!btn) return;
  btn.textContent = audioOn ? '🔊' : '🔇';
  btn.className = 'audio-toggle' + (audioOn ? '' : ' off');
  // keep the id so we can find it
  btn.id = 'audio-toggle';
}

function toggleAudio() {
  audioOn = !audioOn;
  localStorage.setItem('audioOn', audioOn);
  updateAudioToggle();
  if (!audioOn && window.speechSynthesis) window.speechSynthesis.cancel();
  showToast(audioOn ? '🔊 音声オン' : '🔇 音声オフ');
}

function getJapaneseVoice() {
  const voices = window.speechSynthesis.getVoices();
  // Prefer a Japanese voice — look for ja-JP or Japanese in name
  return voices.find(v => v.lang === 'ja-JP') ||
         voices.find(v => v.lang && v.lang.startsWith('ja')) ||
         voices.find(v => v.name && v.name.toLowerCase().includes('japanese')) ||
         null;
}

function speakJapanese(text) {
  if (!audioOn) return;
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();

  const btn = document.getElementById('speak-btn');
  if (btn) btn.classList.add('speaking');

  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = 'ja-JP';
  utter.rate = 0.85;
  utter.pitch = 1.0;

  const voice = getJapaneseVoice();
  if (voice) utter.voice = voice;

  utter.onend = () => {
    const b = document.getElementById('speak-btn');
    if (b) b.classList.remove('speaking');
  };
  utter.onerror = () => {
    const b = document.getElementById('speak-btn');
    if (b) b.classList.remove('speaking');
  };

  currentUtterance = utter;
  window.speechSynthesis.speak(utter);
}

// Auto-speak when a new study card appears (face 0 only)
function autoSpeak(text) {
  if (!audioOn) return;
  // Small delay so card renders first
  setTimeout(() => speakJapanese(text), 300);
}

// Voices load async on some browsers — wait for them
if (window.speechSynthesis) {
  window.speechSynthesis.onvoiceschanged = () => { /* voices now available */ };
}


// ===== LISTEN / AUDIO STUDY MODE =====
let listenPlaying = false;
let listenCardIdx = 0;
let listenPhase = 0; // 0=japanese, 1=english, 2=example
let listenTimeout = null;
let listenSpeed = 1.0; // multiplier for pauses
let listenLoop = false;
let listenShuffle = false;
let listenQueue = [];

// Pause durations in ms (scaled by listenSpeed)
const PAUSE_SHORT  = () => 900  / listenSpeed;
const PAUSE_MEDIUM = () => 1400 / listenSpeed;
const PAUSE_LONG   = () => 2200 / listenSpeed;

function buildListenQueue() {
  const deck = ALL_DECKS[currentDeck];
  listenQueue = deck.cards.map((_, i) => i);
  if (listenShuffle) listenQueue = listenQueue.sort(() => Math.random() - 0.5);
}

function renderListenMode() {
  buildListenQueue();
  listenCardIdx = 0;
  listenPhase = 0;
  listenPlaying = false;
  renderListenUI();
}

function renderListenUI() {
  const area = document.getElementById('listen-area');
  const deck = ALL_DECKS[currentDeck];
  const total = listenQueue.length;
  const cardI = listenQueue[Math.min(listenCardIdx, total - 1)];
  const card = deck.cards[cardI];
  const pct = total > 0 ? Math.round(listenCardIdx / total * 100) : 0;

  const phaseLabels = ['▶ Japanese', '▶ English', '▶ Example'];
  const phaseLabel = listenPlaying ? (phaseLabels[listenPhase] || '') : (listenCardIdx >= total ? 'Complete' : 'Ready');

  const wordClass = card && card.q.length > 6 ? 'listen-word sm' : 'listen-word';

  area.innerHTML = `
    <div class="listen-progress-bar-wrap">
      <div class="listen-progress-bar" style="width:${pct}%"></div>
    </div>
    <div class="listen-progress">${listenCardIdx + 1} / ${total} — ${deck.jp} (${deck.en})</div>

    <div class="listen-player">
      <div class="listen-phase" id="listen-phase">${phaseLabel}</div>
      <div class="${wordClass}" id="listen-word">${card ? card.q : '—'}</div>
      <div class="listen-reading" id="listen-reading">${card && listenPhase >= 1 ? card.kana : ''}</div>
      <div class="listen-english" id="listen-english">${card && listenPhase >= 1 ? card.en : ''}</div>
      <div class="listen-example" id="listen-example">${card && listenPhase >= 2 ? card.ex + '<div class="ex-en">' + card.exen + '</div>' : ''}</div>
    </div>

    <div class="listen-controls">
      <button class="listen-btn" onclick="listenPrev()" title="Previous">⏮</button>
      <button class="listen-btn primary" id="listen-playbtn" onclick="listenTogglePlay()">${listenPlaying ? '⏸' : '▶'}</button>
      <button class="listen-btn" onclick="listenSkip()" title="Skip">⏭</button>
    </div>

    <div class="listen-speed">
      <button class="speed-btn${listenSpeed === 0.6 ? ' active' : ''}" onclick="setListenSpeed(0.6)">🐢 Slow</button>
      <button class="speed-btn${listenSpeed === 1.0 ? ' active' : ''}" onclick="setListenSpeed(1.0)">Normal</button>
      <button class="speed-btn${listenSpeed === 1.6 ? ' active' : ''}" onclick="setListenSpeed(1.6)">⚡ Fast</button>
    </div>

    <div class="listen-options">
      <button class="option-btn${listenLoop ? ' active' : ''}" onclick="toggleListenLoop()">🔁 Loop</button>
      <button class="option-btn${listenShuffle ? ' active' : ''}" onclick="toggleListenShuffle()">🔀 Shuffle</button>
    </div>
  `;
}

function listenTogglePlay() {
  if (listenPlaying) {
    listenPlaying = false;
    if (window.speechSynthesis) window.speechSynthesis.cancel();
    if (listenTimeout) { clearTimeout(listenTimeout); listenTimeout = null; }
    renderListenUI();
  } else {
    listenPlaying = true;
    renderListenUI();
    listenRunPhase();
  }
}

function listenRunPhase() {
  if (!listenPlaying) return;
  const deck = ALL_DECKS[currentDeck];
  const total = listenQueue.length;

  if (listenCardIdx >= total) {
    // Deck complete
    if (listenLoop) {
      listenCardIdx = 0;
      if (listenShuffle) buildListenQueue();
      listenPhase = 0;
      listenRunPhase();
    } else {
      listenPlaying = false;
      showListenComplete();
    }
    return;
  }

  const cardI = listenQueue[listenCardIdx];
  const card = deck.cards[cardI];

  updateListenDisplay(card);

  if (listenPhase === 0) {
    // Speak Japanese word
    updatePhaseLabel('▶ Japanese');
    speakListenText(card.q, 'ja-JP', 0.8, () => {
      listenTimeout = setTimeout(() => {
        listenPhase = 1;
        listenRunPhase();
      }, PAUSE_MEDIUM());
    });

  } else if (listenPhase === 1) {
    // Speak English meaning
    updatePhaseLabel('▶ English');
    updateListenDisplay(card); // reveal english
    speakListenText(card.en.replace(/[~〜（）()\/]/g, ' '), 'en-US', 1.0, () => {
      listenTimeout = setTimeout(() => {
        listenPhase = 2;
        listenRunPhase();
      }, PAUSE_MEDIUM());
    });

  } else if (listenPhase === 2) {
    // Speak example sentence
    updatePhaseLabel('▶ Example sentence');
    updateListenDisplay(card); // reveal example
    speakListenText(card.ex, 'ja-JP', 0.8, () => {
      listenTimeout = setTimeout(() => {
        // Advance to next card
        listenCardIdx++;
        listenPhase = 0;
        listenRunPhase();
      }, PAUSE_LONG());
    });
  }
}

function updatePhaseLabel(label) {
  const el = document.getElementById('listen-phase');
  if (el) el.textContent = label;
}

function updateListenDisplay(card) {
  const wEl = document.getElementById('listen-word');
  const rEl = document.getElementById('listen-reading');
  const eEl = document.getElementById('listen-english');
  const exEl = document.getElementById('listen-example');
  if (wEl) {
    wEl.textContent = card.q;
    wEl.className = card.q.length > 6 ? 'listen-word sm' : 'listen-word';
  }
  if (rEl) rEl.textContent = listenPhase >= 1 ? card.kana : '';
  if (eEl) eEl.textContent = listenPhase >= 1 ? card.en : '';
  if (exEl) exEl.innerHTML = listenPhase >= 2
    ? card.ex + '<div class="ex-en">' + card.exen + '</div>'
    : '';
  // Update progress
  const deck = ALL_DECKS[currentDeck];
  const pct = Math.round(listenCardIdx / listenQueue.length * 100);
  const pb = document.querySelector('.listen-progress-bar');
  if (pb) pb.style.width = pct + '%';
  const pr = document.querySelector('.listen-progress');
  if (pr) pr.textContent = (listenCardIdx + 1) + ' / ' + listenQueue.length + ' — ' + deck.jp + ' (' + deck.en + ')';
}

function speakListenText(text, lang, rate, onEnd) {
  if (!window.speechSynthesis) { onEnd(); return; }
  window.speechSynthesis.cancel();
  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = lang;
  utter.rate = rate;
  if (lang === 'ja-JP') {
    const voice = getJapaneseVoice();
    if (voice) utter.voice = voice;
  }
  utter.onend = onEnd;
  utter.onerror = onEnd; // keep going even on error
  window.speechSynthesis.speak(utter);
}

function listenSkip() {
  if (window.speechSynthesis) window.speechSynthesis.cancel();
  if (listenTimeout) { clearTimeout(listenTimeout); listenTimeout = null; }
  listenCardIdx++;
  listenPhase = 0;
  if (listenPlaying) {
    renderListenUI();
    listenRunPhase();
  } else {
    renderListenUI();
  }
}

function listenPrev() {
  if (window.speechSynthesis) window.speechSynthesis.cancel();
  if (listenTimeout) { clearTimeout(listenTimeout); listenTimeout = null; }
  listenCardIdx = Math.max(0, listenCardIdx - 1);
  listenPhase = 0;
  if (listenPlaying) {
    renderListenUI();
    listenRunPhase();
  } else {
    renderListenUI();
  }
}

function setListenSpeed(s) {
  listenSpeed = s;
  renderListenUI();
  // If playing, the new speed takes effect on next pause
}

function toggleListenLoop() {
  listenLoop = !listenLoop;
  renderListenUI();
  if (listenPlaying) listenRunPhase();
}

function toggleListenShuffle() {
  listenShuffle = !listenShuffle;
  buildListenQueue();
  listenCardIdx = 0;
  listenPhase = 0;
  renderListenUI();
  if (listenPlaying) listenRunPhase();
}

function showListenComplete() {
  const deck = ALL_DECKS[currentDeck];
  const area = document.getElementById('listen-area');
  area.innerHTML = `
    <div class="listen-done">
      <div class="done-icon">🎧</div>
      <h2>きけました！</h2>
      <p>You listened through all ${listenQueue.length} cards in ${deck.jp} (${deck.en}).<br>よくできました！</p>
      <button class="start-btn" onclick="listenCardIdx=0;listenPhase=0;listenPlaying=false;renderListenUI()">もう一回 ▶</button>
    </div>
  `;
}

// ===== INIT =====
updateHUD();
updateAudioToggle();
renderTabs();
renderStudy();
</script>
