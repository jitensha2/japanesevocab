<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>単語カード — Japanese Flashcards</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;700;900&family=Zen+Kaku+Gothic+New:wght@300;400;700&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f4f0;
    --surface: #ffffff;
    --surface2: #f0ede8;
    --border: #ddd9d0;
    --accent: #b8860b;
    --accent2: #2266aa;
    --accent3: #cc3322;
    --accent4: #2a7a4f;
    --text: #1a1612;
    --muted: #9a9388;
    --muted2: #6e6860;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Zen Kaku Gothic New', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    overflow-x: hidden;
  }

  /* subtle grid bg */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 40px 40px;
    opacity: 0.18;
    pointer-events: none;
    z-index: 0;
  }

  /* HEADER */
  header {
    position: relative;
    z-index: 10;
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }

  .logo {
    display: flex;
    align-items: baseline;
    gap: 10px;
  }

  .logo-jp {
    font-family: 'Noto Sans JP', sans-serif;
    font-weight: 900;
    font-size: 1.3rem;
    color: var(--accent);
    letter-spacing: 0.05em;
  }

  .logo-en {
    font-size: 0.68rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted2);
  }

  .deck-tabs {
    display: flex;
    gap: 6px;
  }

  .deck-tab {
    padding: 5px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: none;
    color: var(--muted2);
    font-family: inherit;
    font-size: 0.72rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
  }

  .deck-tab.active {
    background: var(--accent);
    color: var(--bg);
    border-color: var(--accent);
    font-weight: 700;
  }

  .deck-tab:hover:not(.active) {
    border-color: var(--muted2);
    color: var(--text);
  }

  /* PROGRESS */
  .progress-bar-wrap {
    position: relative;
    z-index: 10;
    height: 3px;
    background: var(--border);
  }

  .progress-bar-fill {
    height: 100%;
    background: var(--accent);
    transition: width 0.4s ease;
  }

  .progress-info {
    position: relative;
    z-index: 10;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 24px;
    font-size: 0.7rem;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    border-bottom: 1px solid var(--border);
  }

  .progress-count { color: var(--accent); font-weight: 700; font-size: 0.85rem; }

  .mode-toggle {
    display: flex;
    gap: 4px;
    align-items: center;
  }

  .mode-btn {
    padding: 3px 10px;
    border-radius: 3px;
    border: 1px solid var(--border);
    background: none;
    color: var(--muted);
    font-family: inherit;
    font-size: 0.65rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.15s;
  }

  .mode-btn.active { background: var(--surface2); color: var(--text); border-color: var(--muted2); }

  /* MAIN AREA */
  .card-area {
    position: relative;
    z-index: 5;
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px 20px;
    min-height: 0;
  }

  /* CARD */
  .card-stack {
    position: relative;
    width: 100%;
    max-width: 440px;
  }

  /* Ghost cards behind */
  .card-stack::before,
  .card-stack::after {
    content: '';
    position: absolute;
    left: 50%;
    border-radius: 16px;
    background: var(--surface);
    border: 1px solid var(--border);
  }

  .card-stack::after {
    width: calc(100% - 24px);
    height: 100%;
    top: 10px;
    transform: translateX(-50%);
    z-index: 1;
    opacity: 0.5;
  }

  .card-stack::before {
    width: calc(100% - 48px);
    height: 100%;
    top: 18px;
    transform: translateX(-50%);
    z-index: 0;
    opacity: 0.3;
  }

  .card {
    position: relative;
    z-index: 2;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 40px 32px;
    text-align: center;
    cursor: pointer;
    user-select: none;
    min-height: 300px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    transition: transform 0.15s, box-shadow 0.15s, border-color 0.3s;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }

  .card:hover {
    transform: translateY(-2px);
    box-shadow: 0 12px 40px rgba(0,0,0,0.5);
  }

  .card:active { transform: translateY(0) scale(0.99); }

  .card.reveal-1 { border-color: rgba(126,184,212,0.3); }
  .card.reveal-2 { border-color: rgba(232,201,109,0.4); }

  /* Card reveal animation */
  @keyframes revealIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .reveal-anim { animation: revealIn 0.3s ease forwards; }

  /* Card content layers */
  .card-type-badge {
    position: absolute;
    top: 16px;
    right: 16px;
    font-size: 0.6rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 3px 8px;
    border-radius: 3px;
    background: var(--surface2);
    color: var(--muted2);
    border: 1px solid var(--border);
  }

  .card-type-badge.verb { color: var(--accent); border-color: rgba(232,201,109,0.3); }
  .card-type-badge.word { color: var(--accent2); border-color: rgba(126,184,212,0.3); }

  .card-num {
    position: absolute;
    top: 16px;
    left: 16px;
    font-size: 0.62rem;
    color: var(--muted);
    letter-spacing: 0.08em;
  }

  /* Layer 0: Japanese (always visible) */
  .layer-jp {
    font-family: 'Noto Sans JP', sans-serif;
    font-weight: 700;
    font-size: 4rem;
    line-height: 1.1;
    color: var(--text);
    margin-bottom: 8px;
  }

  .layer-romaji {
    font-size: 0.85rem;
    color: var(--muted2);
    letter-spacing: 0.06em;
    margin-bottom: 6px;
  }

  .layer-en-front {
    font-family: 'DM Serif Display', serif;
    font-style: italic;
    font-size: clamp(1.1rem, 4vw, 1.9rem);
    color: var(--text);
    margin-bottom: 8px;
    width: 100%;
    word-wrap: break-word;
    overflow-wrap: break-word;
    line-height: 1.35;
    text-align: center;
    padding: 0 4px;
  }

  .tap-hint {
    font-size: 0.62rem;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-top: 20px;
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .tap-hint svg { opacity: 0.5; }

  /* Layer 1: English translation */
  .layer-en {
    margin-top: 20px;
    border-top: 1px solid var(--border);
    padding-top: 18px;
    width: 100%;
  }

  .layer-en-label {
    font-size: 0.6rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent2);
    margin-bottom: 6px;
  }

  .layer-en-text {
    font-family: 'DM Serif Display', serif;
    font-size: 1.6rem;
    color: var(--text);
    font-style: italic;
  }

  /* Layer 2: Conjugations */
  .layer-conj {
    margin-top: 18px;
    border-top: 1px solid var(--border);
    padding-top: 16px;
    width: 100%;
  }

  .conj-label {
    font-size: 0.6rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 12px;
  }

  .conj-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    text-align: left;
  }

  .conj-item {
    background: var(--surface2);
    border-radius: 8px;
    padding: 9px 12px;
    border: 1px solid var(--border);
  }

  .conj-item-label {
    font-size: 0.58rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 3px;
  }

  .conj-item-label.a { color: var(--accent3); }
  .conj-item-label.i { color: var(--accent2); }
  .conj-item-label.e { color: var(--accent4); }
  .conj-item-label.te { color: #c084fc; }

  .conj-item-jp {
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 1.15rem;
    color: var(--text);
  }

  .conj-item-suffix {
    font-size: 0.65rem;
    color: var(--muted2);
    margin-top: 1px;
  }

  /* CONTROLS */
  .controls {
    position: relative;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    padding: 20px 24px;
    border-top: 1px solid var(--border);
    background: var(--surface);
  }

  .ctrl-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 48px; height: 48px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--muted2);
    cursor: pointer;
    transition: all 0.15s;
    font-size: 1.1rem;
  }

  .ctrl-btn:hover { border-color: var(--muted2); color: var(--text); transform: scale(1.05); }

  .ctrl-btn.primary {
    width: 60px; height: 60px;
    background: var(--accent);
    color: var(--bg);
    border-color: var(--accent);
    font-size: 1.4rem;
  }

  .ctrl-btn.primary:hover { background: #f0d880; transform: scale(1.08); }

  .shuffle-indicator {
    font-size: 0.62rem;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    text-align: center;
    min-width: 60px;
  }

  /* Done screen */
  .done-screen {
    text-align: center;
    padding: 32px;
  }

  .done-jp {
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 3rem;
    font-weight: 900;
    color: var(--accent);
    margin-bottom: 8px;
  }

  .done-en {
    font-family: 'DM Serif Display', serif;
    font-style: italic;
    font-size: 1.2rem;
    color: var(--muted2);
    margin-bottom: 24px;
  }

  .restart-btn {
    padding: 12px 32px;
    background: var(--accent);
    color: var(--bg);
    border: none;
    border-radius: 8px;
    font-family: inherit;
    font-size: 0.8rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.15s;
  }

  .restart-btn:hover { background: #f0d880; }

  /* hidden util */
  .hidden { display: none !important; }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .slide-up { animation: slideUp 0.35s ease forwards; }

  @media (max-width: 480px) {
    .layer-jp { font-size: 3rem; }
    .card { padding: 32px 24px; min-height: 260px; }
    .conj-grid { grid-template-columns: 1fr 1fr; }
  }

  /* ═══════════════════════════════════════════
     GAME HUD — clean, peripheral, non-competing
  ═══════════════════════════════════════════ */

  .game-hud {
    display: none;
    position: relative;
    z-index: 10;
    background: #1c1a14;
    color: #f0ede6;
    padding: 10px 20px;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    border-bottom: 2px solid var(--border);
  }
  .game-hud.visible { display: flex; }

  .hud-timer {
    font-size: 2rem;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    letter-spacing: -0.02em;
    min-width: 44px;
    text-align: center;
    color: #f5c842;
    transition: color 0.2s;
    font-family: 'DM Serif Display', serif;
  }
  .hud-timer.danger { color: #ff5555; }
  @keyframes urgentPulse { from { opacity: 1; } to { opacity: 0.5; } }
  .hud-timer.danger { animation: urgentPulse 0.4s ease-in-out infinite alternate; }

  .hud-center {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    flex: 1;
  }

  .hud-score {
    font-size: 1.4rem;
    font-weight: 700;
    color: #fff;
    letter-spacing: -0.01em;
  }

  .hud-streak {
    font-size: 0.68rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #ff9f1c;
  }
  .hud-streak.cold { color: #666; }

  /* XP bar */
  .hud-xp-wrap {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 3px;
    min-width: 90px;
  }
  .hud-level {
    font-size: 0.62rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #888;
  }
  .hud-level span { color: #f5c842; font-weight: 700; }
  .hud-xp-track {
    width: 90px;
    height: 6px;
    background: #333;
    border-radius: 3px;
    overflow: hidden;
  }
  .hud-xp-fill {
    height: 100%;
    background: linear-gradient(90deg, #f5c842, #ff9f1c);
    border-radius: 3px;
    transition: width 0.5s cubic-bezier(.17,.67,.35,1.3);
  }

  /* Ghost row */
  .ghost-bar {
    display: none;
    position: relative;
    z-index: 10;
    background: #111;
    padding: 5px 20px;
    align-items: center;
    justify-content: center;
    gap: 16px;
    font-size: 0.68rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #555;
    border-bottom: 1px solid #222;
  }
  .ghost-bar.visible { display: flex; }
  .ghost-best { color: #7eb8d4; }
  .ghost-ahead { color: #82d4a0; }
  .ghost-behind { color: #e87d6d; }

  /* Blitz mode toggle button */
  .blitz-toggle {
    padding: 5px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: none;
    color: var(--muted2);
    font-family: inherit;
    font-size: 0.72rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
    margin-left: 8px;
  }
  .blitz-toggle.on {
    background: #f5c842;
    color: #1a1208;
    border-color: #f5c842;
    font-weight: 700;
  }
  .blitz-toggle:hover:not(.on) { border-color: var(--muted2); color: var(--text); }

  /* Floating score pop */
  .score-pop {
    position: fixed;
    font-size: 1.3rem;
    font-weight: 700;
    pointer-events: none;
    z-index: 999;
    animation: scorePop 0.8s ease-out forwards;
  }
  @keyframes scorePop {
    0%   { opacity: 1; transform: translateY(0) scale(1); }
    100% { opacity: 0; transform: translateY(-60px) scale(1.3); }
  }

  /* Card flash feedback */
  @keyframes flashGreen {
    0%   { box-shadow: 0 0 0 0 rgba(42,122,79,0); }
    30%  { box-shadow: 0 0 0 6px rgba(42,122,79,0.35); }
    100% { box-shadow: 0 0 0 0 rgba(42,122,79,0); }
  }
  @keyframes flashRed {
    0%   { box-shadow: 0 0 0 0 rgba(204,51,34,0); }
    30%  { box-shadow: 0 0 0 6px rgba(204,51,34,0.35); }
    100% { box-shadow: 0 0 0 0 rgba(204,51,34,0); }
  }
  .card.flash-correct { animation: flashGreen 0.5s ease forwards; }
  .card.flash-wrong   { animation: flashRed 0.5s ease forwards; }

  /* Level-up banner */
  .levelup-banner {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0.8);
    background: #1c1a14;
    border: 2px solid #f5c842;
    border-radius: 12px;
    padding: 20px 36px;
    text-align: center;
    z-index: 1000;
    pointer-events: none;
    opacity: 0;
    transition: all 0.25s cubic-bezier(.17,.67,.35,1.3);
  }
  .levelup-banner.show {
    opacity: 1;
    transform: translate(-50%, -50%) scale(1);
  }
  .levelup-jp {
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 2rem;
    font-weight: 900;
    color: #f5c842;
  }
  .levelup-en {
    font-size: 0.7rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #888;
    margin-top: 4px;
  }

  /* Blitz end screen */
  .blitz-results {
    text-align: center;
    padding: 28px 20px;
  }
  .blitz-results-title {
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 1.4rem;
    font-weight: 900;
    color: var(--accent);
    margin-bottom: 18px;
  }
  .blitz-results-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 20px;
  }
  .blitz-stat {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px;
  }
  .blitz-stat-num {
    font-size: 1.8rem;
    font-weight: 700;
    color: var(--text);
    display: block;
  }
  .blitz-stat-label {
    font-size: 0.62rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 2px;
    display: block;
  }
  .blitz-stat.highlight .blitz-stat-num { color: #f5c842; }
  .blitz-stat.ghost-stat .blitz-stat-num { color: #7eb8d4; }
  .blitz-new-best {
    font-size: 0.72rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #f5c842;
    margin-bottom: 14px;
    min-height: 18px;
  }
  .blitz-play-again {
    padding: 12px 32px;
    background: #f5c842;
    color: #1a1208;
    border: none;
    border-radius: 8px;
    font-family: inherit;
    font-size: 0.8rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.15s;
    margin-right: 10px;
  }
  .blitz-play-again:hover { background: #ffd85e; }
  .blitz-study-btn {
    padding: 12px 20px;
    background: none;
    color: var(--muted2);
    border: 1px solid var(--border);
    border-radius: 8px;
    font-family: inherit;
    font-size: 0.75rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.15s;
  }
  .blitz-study-btn:hover { color: var(--text); border-color: var(--muted2); }


</style>
</head>
<body>

<header>
  <div class="logo">
    <span class="logo-jp">単語カード</span>
    <span class="logo-en">Flashcards</span>
  </div>
  <div class="deck-tabs" id="deckTabs"></div>
</header>

<div class="progress-bar-wrap">
  <div class="progress-bar-fill" id="progressFill" style="width:0%"></div>
</div>

<div class="progress-info">
  <span><span class="progress-count" id="cardCount">1</span> / <span id="totalCount">1</span></span>
  <div class="mode-toggle">
    <button class="mode-btn active" id="btnJpEn" onclick="setDirection('jp-en')">JP → EN</button>
    <button class="mode-btn" id="btnEnJp" onclick="setDirection('en-jp')">EN → JP</button>
  </div>
  <span id="deckLabel" style="color:var(--muted2);font-size:0.7rem;letter-spacing:0.08em;text-transform:uppercase;"></span>
  <button class="blitz-toggle" id="blitzToggle" onclick="toggleBlitz()">⚡ Blitz</button>
</div>


<!-- GAME HUD -->
<div class="game-hud" id="gameHud">
  <div class="hud-timer" id="hudTimer">60</div>
  <div class="hud-center">
    <div class="hud-score" id="hudScore">0</div>
    <div class="hud-streak cold" id="hudStreak">no streak</div>
  </div>
  <div class="hud-xp-wrap">
    <div class="hud-level">LV <span id="hudLevel">1</span></div>
    <div class="hud-xp-track"><div class="hud-xp-fill" id="hudXpFill" style="width:0%"></div></div>
    <div class="hud-level" id="hudXpLabel">0 / 100 XP</div>
  </div>
</div>

<!-- GHOST BAR -->
<div class="ghost-bar" id="ghostBar">
  <span>👻 Best: <span class="ghost-best" id="ghostBest">—</span></span>
  <span id="ghostDelta">—</span>
</div>

<!-- LEVEL UP BANNER -->
<div class="levelup-banner" id="levelupBanner">
  <div class="levelup-jp">レベルアップ！</div>
  <div class="levelup-en" id="levelupText">Level 2</div>
</div>

<div class="card-area" id="cardArea">
  <div class="card-stack" id="cardStack">

// ─────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────
let currentDeckId = 'verbs';
let direction = 'jp-en'; // 'jp-en' | 'en-jp'
let queue = [];
let idx = 0;
let tapState = 0; // 0=front, 1=translation, 2=conjugations

function currentDeck() { return decks.find(d => d.id === currentDeckId); }
function currentCard() { return queue[idx]; }

// ─────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────
function init() {
  buildDeckTabs();
  loadDeck(currentDeckId);
}

function buildDeckTabs() {
  const tabs = document.getElementById('deckTabs');
  tabs.innerHTML = '';
  decks.forEach(d => {
    const btn = document.createElement('button');
    btn.className = 'deck-tab' + (d.id === currentDeckId ? ' active' : '');
    btn.textContent = d.label;
    btn.onclick = () => loadDeck(d.id);
    tabs.appendChild(btn);
  });
}

function loadDeck(id) {
  currentDeckId = id;
  queue = [...currentDeck().cards];
  idx = 0;
  tapState = 0;
  buildDeckTabs();
  document.getElementById('deckLabel').textContent = currentDeck().label;
  updateProgress();
  renderCard();
}

// ─────────────────────────────────────────────
// CARD RENDER
// ─────────────────────────────────────────────
function renderCard() {
  const c = currentCard();
  if (!c) { renderDone(); return; }

  // Rebuild card element if renderDone wiped it
  let card = document.getElementById('mainCard');
  if (!card) {
    document.getElementById('cardStack').innerHTML = '<div class="card" id="mainCard" onclick="tapCard()"></div>';
    card = document.getElementById('mainCard');
  }

  card.className = 'card';
  if (tapState >= 1) card.classList.add('reveal-1');
  if (tapState >= 2) card.classList.add('reveal-2');

  const isJpEn = direction === 'jp-en';
  const frontJp  = isJpEn ? c.jp : null;
  const frontEn  = isJpEn ? null : c.en;
  const frontRom = isJpEn ? c.romaji : null;

  let html = `
    <div class="card-num">${idx + 1}</div>
    <div class="card-type-badge ${c.type}">${c.type === 'verb' ? (c.group || '動詞 verb') : '単語 word'}</div>
  `;

  // FRONT FACE
  if (isJpEn) {
    html += `<div class="layer-jp">${c.jp}</div>`;
    html += `<div class="layer-romaji">${c.romaji}</div>`;
  } else {
    html += `<div class="layer-en-front">${c.en}</div>`;
  }

  // TAP HINT
  if (tapState === 0) {
    html += `<div class="tap-hint">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2a10 10 0 1 0 0 20 10 10 0 0 0 0-20z"/><path d="M12 8v4l3 3"/></svg>
      tap to reveal
    </div>`;
  }

  // LAYER 1: Translation
  if (tapState >= 1) {
    html += `<div class="layer-en reveal-anim">`;
    if (isJpEn) {
      html += `<div class="layer-en-label">English</div>
               <div class="layer-en-text">${c.en}</div>`;
    } else {
      html += `<div class="layer-en-label">Japanese</div>
               <div class="layer-jp" style="font-size:2.5rem;margin:0;width:100%">${c.jp}</div>
               <div class="layer-romaji">${c.romaji}</div>`;
    }
    html += `</div>`;

    // Show tap hint for verbs only if tap 2 not yet shown
    if (c.type === 'verb' && tapState === 1) {
      html += `<div class="tap-hint" style="margin-top:12px">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2a10 10 0 1 0 0 20 10 10 0 0 0 0-20z"/><path d="M12 8v4l3 3"/></svg>
        tap for conjugations
      </div>`;
    }
  }

  // LAYER 2: Conjugations (verbs only)
  if (tapState >= 2 && c.type === 'verb') {
    html += `<div class="layer-conj reveal-anim">
      <div class="conj-label">Conjugations</div>
      <div class="conj-grid">
        <div class="conj-item">
          <div class="conj-item-label a">a-form</div>
          <div class="conj-item-jp">${c.a}</div>
          <div class="conj-item-suffix">→ ない (negative)</div>
        </div>
        <div class="conj-item">
          <div class="conj-item-label i">i-form</div>
          <div class="conj-item-jp">${c.i}</div>
          <div class="conj-item-suffix">→ ます (polite)</div>
        </div>
        <div class="conj-item">
          <div class="conj-item-label e">e-form</div>
          <div class="conj-item-jp">${c.e}</div>
          <div class="conj-item-suffix">→ る (potential)</div>
        </div>
        <div class="conj-item">
          <div class="conj-item-label te">て-form</div>
          <div class="conj-item-jp">${c.te}</div>
          <div class="conj-item-suffix">→ ください (request)</div>
        </div>
      </div>
    </div>`;
  }

  card.innerHTML = html;
}

function renderDone() {
  const area = document.getElementById('cardArea');
  document.getElementById('cardStack').innerHTML = `
    <div class="done-screen slide-up">
      <div class="done-jp">おつかれさま！</div>
      <div class="done-en">Well done — deck complete</div>
      <button class="restart-btn" onclick="restartDeck()">Start Again</button>
    </div>
  `;
}

// ─────────────────────────────────────────────
// INTERACTIONS
// ─────────────────────────────────────────────
function tapCard() {
  const c = currentCard();
  if (!c) return;

  const maxTaps = c.type === 'verb' ? 2 : 1;
  if (tapState < maxTaps) {
    tapState++;
    renderCard();
  } else {
    nextCard();
  }
}

function nextCard() {
  if (idx < queue.length - 1) {
    idx++;
    tapState = 0;
    renderCard();
    updateProgress();
  } else {
    renderDone();
  }
}

function prevCard() {
  if (idx > 0) {
    idx--;
    tapState = 0;
    renderCard();
    updateProgress();
  }
}

function resetCard() {
  tapState = 0;
  renderCard();
}

function shuffleDeck() {
  queue = [...currentDeck().cards].sort(() => Math.random() - 0.5);
  idx = 0;
  tapState = 0;
  updateProgress();
  renderCard();
}

function restartDeck() {
  // renderCard will rebuild mainCard if missing, so just reset state
  idx = 0;
  tapState = 0;
  queue = [...currentDeck().cards];
  updateProgress();
  renderCard();
}

function setDirection(dir) {
  direction = dir;
  document.getElementById('btnJpEn').classList.toggle('active', dir === 'jp-en');
  document.getElementById('btnEnJp').classList.toggle('active', dir === 'en-jp');
  idx = 0;
  tapState = 0;
  queue = [...currentDeck().cards];
  updateProgress();
  renderCard();
}

function updateProgress() {
  const total = queue.length;
  const current = Math.min(idx + 1, total);
  document.getElementById('cardCount').textContent = current;
  document.getElementById('totalCount').textContent = total;
  document.getElementById('progressFill').style.width = `${(current / total) * 100}%`;
}

// keyboard shortcuts
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); nextCard(); }
  if (e.key === 'ArrowLeft') prevCard();
  if (e.key === 'Enter') tapCard();
  if (e.key === 'r' || e.key === 'R') resetCard();
});

init();

// ═══════════════════════════════════════════════════════
// GAME ENGINE — Blitz mode, XP, Streaks, Ghost
// ═══════════════════════════════════════════════════════

// ── Persistent state (localStorage) ──
const SAVE_KEY = 'tango_game_v1';
function loadSave() {
  try { return JSON.parse(localStorage.getItem(SAVE_KEY)) || {}; } catch(e) { return {}; }
}
function writeSave(data) {
  try { localStorage.setItem(SAVE_KEY, JSON.stringify(data)); } catch(e) {}
}

let save = loadSave();
// save.xp, save.level, save.ghostScores = { deckId: { dir: score } }
if (!save.xp)          save.xp = 0;
if (!save.level)       save.level = 1;
if (!save.ghostScores) save.ghostScores = {};

// XP thresholds per level (cumulative total XP needed)
const XP_PER_LEVEL = 100;
function xpForLevel(lvl) { return lvl * XP_PER_LEVEL; }
function totalXpNeeded() { return xpForLevel(save.level); }

// ── Blitz state ──
let blitzActive   = false;
let blitzTimer    = null;
let blitzSeconds  = 60;
let blitzScore    = 0;
let blitzStreak   = 0;
let blitzBest     = 0;  // ghost score for current deck+dir
let blitzCards    = []; // shuffled queue for blitz
let blitzIdx      = 0;
let blitzAnswered = false; // has current card been answered (tapped to translation)?

// ── Audio (Web Audio API — no external files needed) ──
let audioCtx = null;
function getAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}
function playTone(freq, type, dur, vol=0.18) {
  try {
    const ctx = getAudio();
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.type = type; o.frequency.value = freq;
    g.gain.setValueAtTime(vol, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
    o.start(); o.stop(ctx.currentTime + dur);
  } catch(e) {}
}
function sfxCorrect() {
  playTone(520, 'sine', 0.08, 0.15);
  setTimeout(() => playTone(780, 'sine', 0.12, 0.12), 60);
}
function sfxStreak() {
  [520, 660, 780, 1040].forEach((f, i) => setTimeout(() => playTone(f, 'sine', 0.1, 0.14), i * 55));
}
function sfxLevelUp() {
  [440, 554, 659, 880].forEach((f, i) => setTimeout(() => playTone(f, 'triangle', 0.18, 0.18), i * 80));
}
function sfxWrong() {
  playTone(220, 'sawtooth', 0.12, 0.1);
}
function sfxTick() {
  playTone(880, 'sine', 0.04, 0.06);
}
function sfxTimeUp() {
  [330, 220, 165].forEach((f, i) => setTimeout(() => playTone(f, 'sawtooth', 0.2, 0.15), i * 100));
}

// ── Toggle blitz mode ──
function toggleBlitz() {
  if (blitzActive) {
    stopBlitz();
  } else {
    startBlitz();
  }
}

function startBlitz() {
  blitzActive   = true;
  blitzSeconds  = 60;
  blitzScore    = 0;
  blitzStreak   = 0;
  blitzAnswered = false;

  // Load ghost for this deck + direction
  const ghostKey = currentDeckId + '_' + direction;
  blitzBest = (save.ghostScores[ghostKey]) || 0;

  // Shuffle a fresh queue
  blitzCards = [...currentDeck().cards].sort(() => Math.random() - 0.5);
  blitzIdx   = 0;

  // Update UI
  document.getElementById('blitzToggle').classList.add('on');
  document.getElementById('blitzToggle').textContent = '■ Stop';
  document.getElementById('gameHud').classList.add('visible');
  document.getElementById('ghostBar').classList.add('visible');
  updateHud();
  updateGhostBar();

  // Hide normal nav controls during blitz
  document.querySelector('.controls').style.opacity = '0.3';
  document.querySelector('.controls').style.pointerEvents = 'none';

  // Render first blitz card
  renderBlitzCard();

  // Start countdown
  blitzTimer = setInterval(tickTimer, 1000);
}

function stopBlitz() {
  clearInterval(blitzTimer);
  blitzTimer  = null;
  blitzActive = false;

  document.getElementById('blitzToggle').classList.remove('on');
  document.getElementById('blitzToggle').textContent = '⚡ Blitz';
  document.getElementById('gameHud').classList.remove('visible');
  document.getElementById('ghostBar').classList.remove('visible');

  document.querySelector('.controls').style.opacity = '';
  document.querySelector('.controls').style.pointerEvents = '';

  // Return to normal study mode
  loadDeck(currentDeckId);
}

function tickTimer() {
  blitzSeconds--;
  if (blitzSeconds <= 5) sfxTick();

  const timerEl = document.getElementById('hudTimer');
  timerEl.textContent = blitzSeconds;
  timerEl.className = 'hud-timer' + (blitzSeconds <= 10 ? ' danger' : '');

  if (blitzSeconds <= 0) {
    clearInterval(blitzTimer);
    blitzTimer = null;
    endBlitz();
  }
}

function endBlitz() {
  sfxTimeUp();

  // Save ghost score if new best
  const ghostKey = currentDeckId + '_' + direction;
  const isNewBest = blitzScore > blitzBest;
  if (isNewBest) {
    save.ghostScores[ghostKey] = blitzScore;
    writeSave(save);
  }

  // Show results screen
  const stack = document.getElementById('cardStack');
  stack.innerHTML = `
    <div class="blitz-results slide-up">
      <div class="blitz-results-title">時間切れ！ Time's Up!</div>
      <div class="blitz-new-best">${isNewBest ? '🏆 New Personal Best!' : (blitzBest > 0 ? '👻 Best: ' + blitzBest : '')}</div>
      <div class="blitz-results-grid">
        <div class="blitz-stat highlight">
          <span class="blitz-stat-num">${blitzScore}</span>
          <span class="blitz-stat-label">Score</span>
        </div>
        <div class="blitz-stat">
          <span class="blitz-stat-num">${blitzStreak}</span>
          <span class="blitz-stat-label">Best Streak</span>
        </div>
        <div class="blitz-stat ghost-stat">
          <span class="blitz-stat-num">${Math.max(blitzBest, blitzScore)}</span>
          <span class="blitz-stat-label">Personal Best</span>
        </div>
        <div class="blitz-stat">
          <span class="blitz-stat-num">LV ${save.level}</span>
          <span class="blitz-stat-label">Level</span>
        </div>
      </div>
      <button class="blitz-play-again" onclick="replayBlitz()">⚡ Play Again</button>
      <button class="blitz-study-btn" onclick="exitBlitz()">Study Mode</button>
    </div>
  `;

  document.getElementById('gameHud').classList.remove('visible');
  document.getElementById('ghostBar').classList.remove('visible');
  document.getElementById('blitzToggle').classList.remove('on');
  document.getElementById('blitzToggle').textContent = '⚡ Blitz';
  document.querySelector('.controls').style.opacity = '';
  document.querySelector('.controls').style.pointerEvents = '';
  blitzActive = false;
}

function replayBlitz() {
  const stack = document.getElementById('cardStack');
  stack.innerHTML = '<div class="card" id="mainCard" onclick="tapCard()"></div>';
  startBlitz();
}

function exitBlitz() {
  const stack = document.getElementById('cardStack');
  stack.innerHTML = '<div class="card" id="mainCard" onclick="tapCard()"></div>';
  loadDeck(currentDeckId);
}

// ── Blitz card rendering ──
function renderBlitzCard() {
  let card = document.getElementById('mainCard');
  if (!card) {
    document.getElementById('cardStack').innerHTML = '<div class="card" id="mainCard" onclick="tapCard()"></div>';
    card = document.getElementById('mainCard');
  }
  card.className = 'card';

  const c = blitzCards[blitzIdx % blitzCards.length];
  const isJpEn = direction === 'jp-en';
  blitzAnswered = false;

  let html = `<div class="card-type-badge ${c.type}">${c.type === 'verb' ? '動詞 verb' : '単語 word'}</div>`;

  if (isJpEn) {
    html += `<div class="layer-jp">${c.jp}</div>`;
    html += `<div class="layer-romaji">${c.romaji}</div>`;
  } else {
    html += `<div class="layer-en-front">${c.en}</div>`;
  }

  html += `<div class="tap-hint">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M12 2a10 10 0 1 0 0 20 10 10 0 0 0 0-20z"/><path d="M12 8v4l3 3"/>
    </svg>
    tap — knew it &nbsp;|&nbsp; skip →
  </div>`;

  card.innerHTML = html;
}

function blitzTap() {
  if (!blitzActive) return;
  const c = blitzCards[blitzIdx % blitzCards.length];
  const isJpEn = direction === 'jp-en';

  if (!blitzAnswered) {
    // First tap: reveal answer
    blitzAnswered = true;
    const card = document.getElementById('mainCard');
    card.classList.add('reveal-1');

    let extra = `<div class="layer-en reveal-anim">`;
    if (isJpEn) {
      extra += `<div class="layer-en-label">English</div><div class="layer-en-text">${c.en}</div>`;
    } else {
      extra += `<div class="layer-en-label">Japanese</div>
                <div class="layer-jp" style="font-size:2.5rem;margin:0;width:100%">${c.jp}</div>
                <div class="layer-romaji">${c.romaji}</div>`;
    }
    extra += `</div>`;
    extra += `<div class="tap-hint" style="margin-top:12px;gap:12px;">
      <span onclick="blitzAnswer(true)" style="cursor:pointer;color:var(--accent4);font-weight:700;">✓ Knew it</span>
      &nbsp;·&nbsp;
      <span onclick="blitzAnswer(false)" style="cursor:pointer;color:var(--accent3);">✗ Missed it</span>
    </div>`;

    card.innerHTML += extra;
  } else {
    // Second tap = "knew it"
    blitzAnswer(true);
  }
}

function blitzAnswer(correct) {
  if (!blitzActive) return;
  const card = document.getElementById('mainCard');

  if (correct) {
    blitzStreak++;
    const multiplier = blitzStreak >= 5 ? 3 : blitzStreak >= 3 ? 2 : 1;
    const points = 10 * multiplier;
    blitzScore += points;

    card.classList.add('flash-correct');
    showScorePop('+' + points + (multiplier > 1 ? ' ×' + multiplier + '🔥' : ''), true);

    if (blitzStreak >= 3 && blitzStreak % 3 === 0) sfxStreak();
    else sfxCorrect();

    // Award XP
    addXP(multiplier === 3 ? 8 : multiplier === 2 ? 5 : 3);
  } else {
    blitzStreak = 0;
    card.classList.add('flash-wrong');
    showScorePop('miss', false);
    sfxWrong();
  }

  updateHud();
  updateGhostBar();

  blitzIdx++;
  setTimeout(() => renderBlitzCard(), 300);
}

// ── Score pop animation ──
function showScorePop(text, good) {
  const card = document.getElementById('mainCard');
  if (!card) return;
  const rect = card.getBoundingClientRect();
  const pop = document.createElement('div');
  pop.className = 'score-pop';
  pop.textContent = text;
  pop.style.color = good ? '#2a7a4f' : '#cc3322';
  pop.style.left = (rect.left + rect.width / 2 - 30) + 'px';
  pop.style.top  = (rect.top + rect.height / 3) + 'px';
  document.body.appendChild(pop);
  setTimeout(() => pop.remove(), 900);
}

// ── XP system ──
function addXP(amount) {
  save.xp += amount;
  let leveled = false;
  while (save.xp >= xpForLevel(save.level)) {
    save.xp -= xpForLevel(save.level);
    save.level++;
    leveled = true;
  }
  writeSave(save);
  updateXpBar();
  if (leveled) showLevelUp();
}

function updateXpBar() {
  const needed = xpForLevel(save.level);
  const pct = Math.min(100, (save.xp / needed) * 100);
  document.getElementById('hudXpFill').style.width = pct + '%';
  document.getElementById('hudLevel').textContent = save.level;
  document.getElementById('hudXpLabel').textContent = save.xp + ' / ' + needed + ' XP';
}

function showLevelUp() {
  sfxLevelUp();
  const banner = document.getElementById('levelupBanner');
  document.getElementById('levelupText').textContent = 'Level ' + save.level;
  banner.classList.add('show');
  setTimeout(() => banner.classList.remove('show'), 2200);
}

// ── HUD updater ──
function updateHud() {
  document.getElementById('hudTimer').textContent  = blitzSeconds;
  document.getElementById('hudScore').textContent  = blitzScore;

  const streakEl = document.getElementById('hudStreak');
  if (blitzStreak === 0) {
    streakEl.textContent = 'no streak';
    streakEl.className = 'hud-streak cold';
  } else if (blitzStreak < 3) {
    streakEl.textContent = blitzStreak + ' streak';
    streakEl.className = 'hud-streak';
  } else {
    streakEl.textContent = blitzStreak + ' streak 🔥';
    streakEl.className = 'hud-streak';
  }

  updateXpBar();
}

function updateGhostBar() {
  const ghostKey = currentDeckId + '_' + direction;
  const best = save.ghostScores[ghostKey] || 0;
  document.getElementById('ghostBest').textContent = best || '—';

  const deltaEl = document.getElementById('ghostDelta');
  if (best === 0) {
    deltaEl.textContent = 'no ghost yet';
    deltaEl.className = '';
  } else {
    const diff = blitzScore - best;
    if (diff > 0) {
      deltaEl.textContent = '+' + diff + ' ahead 👻';
      deltaEl.className = 'ghost-ahead';
    } else if (diff < 0) {
      deltaEl.textContent = diff + ' behind';
      deltaEl.className = 'ghost-behind';
    } else {
      deltaEl.textContent = 'tied with ghost';
      deltaEl.className = '';
    }
  }
}

// ── Override tapCard to route to blitz when active ──
const _origTapCard = tapCard;
window.tapCard = function() {
  if (blitzActive) { blitzTap(); return; }
  _origTapCard();
};

// ── Keyboard: space/enter in blitz = tap; skip = right arrow ──
const _origKeydown = null;
document.addEventListener('keydown', e => {
  if (!blitzActive) return;
  if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); blitzTap(); }
  if (e.key === 'ArrowRight') { e.preventDefault(); blitzAnswer(false); }
  if (e.key === 'y' || e.key === 'Y') blitzAnswer(true);
  if (e.key === 'n' || e.key === 'N') blitzAnswer(false);
});

</script>
